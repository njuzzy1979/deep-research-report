# ───────────────────────────────────────────────────────
# 默认配置文件（与《研究报告格式规范 V3.0》完全对齐）
# ───────────────────────────────────────────────────────
# 用户提供的 report.yaml 中的项会覆盖此默认值。
# CLI 参数(--title/--org/--config 等)优先级最高。

# 报告元数据
metadata:
  title: ""
  subtitle: ""
  subtype: "深度研究报告"
  org: ""
  version: "V1.0"
  date: ""
  header_short: ""

# 字体方案（V3.0 §3.1）
fonts:
  body:
    cjk: "宋体"
    latin: "Times New Roman"
  heading:
    cjk: "微软雅黑"
    latin: "Times New Roman"
  mono:
    cjk: "宋体"
    latin: "Consolas"
  table_header:
    cjk: "微软雅黑"
    latin: "Times New Roman"
  table_body:
    cjk: "宋体"
    latin: "Times New Roman"
  special:
    cjk: "楷体"
    latin: "Times New Roman"

# 字号 (pt) - V3.0 §3.2, §3.3
sizes:
  cover_title: 28
  cover_subtitle: 14
  cover_type: 16
  cover_info: 11
  h1: 24
  h2: 16
  h3: 14
  h4: 12
  h5: 12
  body: 11
  table_header: 10
  table_body: 10.5
  quote: 10.5
  caption: 9
  footnote: 9
  header_footer: 9

# 页面布局（V3.0 §2）
page:
  width: 21.0
  height: 29.7
  margin_top: 2.54
  margin_bottom: 2.54
  margin_left: 3.17
  margin_right: 2.54
  header_distance: 1.27
  footer_distance: 1.27

# 行距
line_spacing:
  body: 1.5
  heading: 1.0
  caption: 1.0
  footnote: 1.0
  quote: 1.5

# 缩进 (cm)
indent:
  body_first_line: 0.74
  quote_left: 1.5
  list_left: 1.5
  list_hang: 0.75

# 段间距 (pt) - V3.0 §3.2
spacing:
  h1_before: 0
  h1_after: 18
  h2_before: 24
  h2_after: 12
  h3_before: 18
  h3_after: 8
  h4_before: 12
  h4_after: 6
  h5_before: 8
  h5_after: 4
  body_before: 0
  body_after: 0
  title_before: 24
  title_after: 18

# 配色方案（V3.0 §11）
colors:
  primary: "000000"
  secondary: "555555"
  bg_light: "F2F2F2"
  accent: "333333"
  separator: "BBBBBB"
  link: "0563C1"

# 页眉页脚
header_footer:
  header_text: "{title}"
  header_show_on_cover: false
  header_show_on_toc: false
  page_number_summary: "roman"
  page_number_body: "arabic"

# 表格（V3.0 §5.1）
table:
  width_pct: 90
  border_outer: 1.5
  border_header_sep: 1.0
  border_inner: 0.5
  alt_row_color: "F2F2F2"
  repeat_header: true

# 封面（V3.0 §7）
cover:
  top_spacing_cm: 6.0
  show_separator: true
  separator_char: "━"
  separator_repeat: 40

# TOC
toc:
  levels: 3
  show_page_numbers: true
  hyperlinks: true

# Markdown 约定识别
markdown:
  enable_front_matter: true
  heading_auto_number: true
  strip_manual_numbering: true
  recognize_special_blocks: true
