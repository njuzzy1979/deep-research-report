# ───────────────────────────────────────────────────────
# 项目默认报告配置
# ───────────────────────────────────────────────────────
# 此文件覆盖 md2docx/default_config.yaml 的默认值。
# CLI 参数 (--title/--org 等) 优先级最高。

# 报告元数据（留空：优先从 Markdown front matter 读取）
metadata:
  title: ""
  subtitle: ""
  subtype: "深度研究报告"
  org: "遨天科技"
  version: "V1.0"
  date: ""
  header_short: ""

# 字体方案（V3.0 §3.1）
fonts:
  body:
    cjk: "宋体"
    latin: "Times New Roman"
  heading:
    cjk: "微软雅黑"
    latin: "Times New Roman"
  mono:
    cjk: "宋体"
    latin: "Consolas"
  table_header:
    cjk: "微软雅黑"
    latin: "Times New Roman"
  table_body:
    cjk: "宋体"
    latin: "Times New Roman"

# 封面
cover:
  top_spacing_cm: 6.0
  show_separator: true
